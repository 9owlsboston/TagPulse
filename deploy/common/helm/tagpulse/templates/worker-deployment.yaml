apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tagpulse.fullname" . }}-worker
  labels:
    {{- include "tagpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  # MQTT subscriber is single-instance-per-broker; never run rolling
  # updates that briefly double-subscribe.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "tagpulse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "tagpulse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "tagpulse.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "tagpulse.image" (list "worker" .Values) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # Sprint 22 B1: worker hosts MQTT subscriber + inventory/dwell/
            # alert/analytics/webhook workers. HTTP exists for liveness probes
            # only; no Service routes traffic here.
            - name: WORKERS_INLINE
              value: "true"
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existing }}
                  key: mqtt-username
                  optional: true
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existing }}
                  key: mqtt-password
                  optional: true
            {{- include "tagpulse.commonEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
