apiVersion: v1
kind: Service
metadata:
  name: {{ include "tagpulse.fullname" . }}-api
  labels:
    {{- include "tagpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "tagpulse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
