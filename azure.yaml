# azure.yaml — Azure Developer CLI (azd) configuration.
#
# Run from the repo root:
#   azd env new tagpulse-prod
#   azd env set AZURE_LOCATION southcentralus
#   azd env set AZURE_SUBSCRIPTION_ID <sub-id>
#   azd up
#
# `azd up` will:
#   1. Provision infra via deploy/azure/bicep/main.bicep
#   2. Build + push the three images to ACR (api, worker, migrations)
#   3. Run the migrations job to completion (postdeploy hook)
#   4. Update the api + worker container apps to the new image tag
#
# For CI/CD, the .github/workflows/deploy-azure.yml workflow uses these same hooks.

name: tagpulse
metadata:
  template: tagpulse@sprint-22-c

infra:
  provider: bicep
  path: deploy/azure/bicep
  module: main
  parameters:
    # azd injects these from the env (azd env set ...) at deploy time.
    postgresAdminPassword: ${AZURE_POSTGRES_ADMIN_PASSWORD}
    jwtSecret: ${AZURE_JWT_SECRET}
    mqttPassword: ${AZURE_MQTT_PASSWORD}

services:
  api:
    project: .
    language: python
    host: containerapp
    docker:
      path: Dockerfile
      target: api
      remoteBuild: false
      registry: ${AZURE_ACR_LOGIN_SERVER}
      image: tagpulse-api
      tag: ${AZURE_IMAGE_TAG}

  worker:
    project: .
    language: python
    host: containerapp
    docker:
      path: Dockerfile
      target: worker
      remoteBuild: false
      registry: ${AZURE_ACR_LOGIN_SERVER}
      image: tagpulse-worker
      tag: ${AZURE_IMAGE_TAG}

  migrations:
    project: .
    language: python
    host: containerapp
    docker:
      path: Dockerfile
      target: migrations
      remoteBuild: false
      registry: ${AZURE_ACR_LOGIN_SERVER}
      image: tagpulse-migrations
      tag: ${AZURE_IMAGE_TAG}

hooks:
  # Before provisioning: auto-recover any soft-deleted Key Vault whose name
  # matches this env's prefix. Without this, redeploying after a teardown
  # (or a partial provision failure) hits `VaultAlreadyExists` because KV
  # names are globally unique and soft-delete reserves the name for 7–90
  # days. The script is idempotent and a no-op when nothing matches.
  #
  # Then build the Mosquitto image into ACR if ACR exists (no-op on first
  # provision; populates `tagpulse-mqtt` from the second `azd up` onwards).
  # Finally, image-check probes ACR for all four repos and toggles
  # AZURE_USE_IMAGE_PLACEHOLDERS so first provision uses public placeholders
  # and subsequent runs use the real images.
  preprovision:
    shell: sh
    run: |
      set -e
      ./scripts/azd-kv-recover.sh
      ./scripts/azd-mqtt-build.sh
      ./scripts/azd-image-check.sh

  # After provisioning: capture ACR login server + image tag into env vars so
  # subsequent service deploys reference the right registry. azd auto-promotes
  # the `AZURE_CONTAINER_REGISTRY_ENDPOINT` Bicep output (it's the canonical
  # name azd's docker package step looks for); this hook backfills the same
  # value into our legacy `AZURE_ACR_LOGIN_SERVER` for any code/scripts that
  # still reference it, plus seeds AZURE_IMAGE_TAG.
  postprovision:
    shell: sh
    run: |
      set -e
      # azd env get-value writes "ERROR: key not found ..." to STDOUT (not
      # stderr) and exits non-zero when the key is missing. Use a helper so
      # callers can rely on `-z` checks instead of capturing error text.
      get() {
        local v
        if v=$(azd env get-value "$1" 2>/dev/null); then
          printf '%s' "$v" | tr -d '\r'
        fi
      }
      ACR_LOGIN_SERVER=$(get AZURE_CONTAINER_REGISTRY_ENDPOINT)
      if [ -z "$ACR_LOGIN_SERVER" ]; then
        ACR_LOGIN_SERVER=$(get AZURE_ACR_LOGIN_SERVER)
      fi
      if [ -z "$ACR_LOGIN_SERVER" ]; then
        ACR_NAME=$(get acrName)
        if [ -n "$ACR_NAME" ]; then
          ACR_LOGIN_SERVER="${ACR_NAME}.azurecr.io"
        fi
      fi
      azd env set AZURE_CONTAINER_REGISTRY_ENDPOINT "$ACR_LOGIN_SERVER"
      azd env set AZURE_ACR_LOGIN_SERVER "$ACR_LOGIN_SERVER"
      if [ -z "$(get AZURE_IMAGE_TAG)" ]; then
        azd env set AZURE_IMAGE_TAG "$(git rev-parse --short HEAD 2>/dev/null || echo latest)"
      fi
      echo "ACR=$ACR_LOGIN_SERVER  TAG=$(get AZURE_IMAGE_TAG)"

  # Before deploying services: ensure the Flexible Server is running.
  # Burstable-tier servers auto-stop after 7 days of inactivity (and dev
  # servers are frequently stopped manually); when stopped, the migrations
  # job and the api both fail their DB checks and `azd deploy` hangs the
  # postdeploy migrations poll. Idempotent no-op when already Ready.
  predeploy:
    shell: sh
    run: |
      set -e
      ./scripts/azd-pg-ensure-running.sh

  # After all services are deployed (images pushed): run the migrations job to
  # completion before users hit the new api revision. Then run the Sprint 23
  # network reachability smoke (no-op unless the VNet flags are on).
  #
  # Reads resource names from azd env values (auto-promoted from Bicep
  # outputs) instead of `az deployment sub show --name $AZURE_ENV_NAME`,
  # which broke in newer azd: the sub-deployment name is no longer always
  # equal to $AZURE_ENV_NAME and the lookup fails with DeploymentNotFound.
  postdeploy:
    shell: sh
    run: |
      set -e
      get() {
        local v
        if v=$(azd env get-value "$1" 2>/dev/null); then
          printf '%s' "$v" | tr -d '\r'
        fi
      }
      RG=$(get AZURE_RESOURCE_GROUP)
      JOB=$(get migrationsJobName)
      if [ -z "$RG" ] || [ -z "$JOB" ]; then
        echo "postdeploy: missing AZURE_RESOURCE_GROUP or migrationsJobName in azd env" >&2
        exit 1
      fi
      echo "Starting migrations job $JOB in $RG"
      EXEC=$(az containerapp job start --name "$JOB" --resource-group "$RG" --query 'name' -o tsv)
      echo "Execution: $EXEC -- waiting for completion (timeout 10m)"
      MIGRATIONS_OK=0
      for i in $(seq 1 60); do
        STATUS=$(az containerapp job execution show --name "$JOB" --resource-group "$RG" --job-execution-name "$EXEC" --query 'properties.status' -o tsv 2>/dev/null || echo Running)
        case "$STATUS" in
          Succeeded) echo "Migrations succeeded"; MIGRATIONS_OK=1; break ;;
          Failed|Degraded) echo "Migrations failed: $STATUS"; exit 1 ;;
          *) sleep 10 ;;
        esac
      done
      if [ "$MIGRATIONS_OK" != "1" ]; then
        echo "Migrations job timed out"
        exit 1
      fi
      # Sprint 23 Phase C1 -- network reachability smoke test. The script
      # itself no-ops unless both AZURE_ENABLE_VNET and
      # AZURE_DISABLE_PUBLIC_NETWORK_ACCESS resolve to 'true'.
      AZURE_KEYVAULT_NAME=$(get keyVaultName) \
      AZURE_POSTGRES_FQDN=$(get postgresFqdn) \
      AZURE_API_APP_NAME=$(get apiAppName) \
      AZURE_ENABLE_VNET=$(get AZURE_ENABLE_VNET) \
      AZURE_DISABLE_PUBLIC_NETWORK_ACCESS=$(get AZURE_DISABLE_PUBLIC_NETWORK_ACCESS) \
        ./scripts/azd-network-check.sh
