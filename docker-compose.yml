services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://tagpulse:secret@db:5432/tagpulse
      MQTT_BROKER_HOST: mqtt
      MQTT_BROKER_PORT: "1883"
      LOG_LEVEL: debug
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      JWT_SECRET: "dev-secret-change-in-production"
      # Sprint 22 B1: API container hosts HTTP only; the ``worker`` service
      # below runs the MQTT subscriber + inventory/dwell/alert workers.
      WORKERS_INLINE: "false"
      # Sprint 17a geofence point-in-polygon eval is gated by a rollout
      # flag (off by default in production until the bbox index is live).
      # Force-enable in dev so the smoke test's zone.entered/exited rules
      # actually fire — see docs/quickstart.md §6b.
      GEOFENCE_EVALUATION_ENABLED: "true"
      # Dev-only: make the bind-mounted ``/app/src`` shadow the wheel
      # installed into site-packages by the Dockerfile, so edits to
      # ``src/tagpulse/...`` on the host are picked up by uvicorn
      # ``--reload`` without rebuilding the image. Production images
      # don't set PYTHONPATH and continue to import from the installed
      # wheel as before.
      PYTHONPATH: /app/src
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src
    networks:
      default:
        aliases:
          - api
    command: >
      uvicorn tagpulse.api.main:app
      --host 0.0.0.0 --port 8000 --reload
      --reload-dir /app/src

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgresql+asyncpg://tagpulse:secret@db:5432/tagpulse
      MQTT_BROKER_HOST: mqtt
      MQTT_BROKER_PORT: "1883"
      LOG_LEVEL: debug
      JWT_SECRET: "dev-secret-change-in-production"
      WORKERS_INLINE: "true"
      GEOFENCE_EVALUATION_ENABLED: "true"
      # Dev-only PYTHONPATH override — see app service above for rationale.
      PYTHONPATH: /app/src
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrations
    environment:
      DATABASE_URL: postgresql+asyncpg://tagpulse:secret@db:5432/tagpulse
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  ui:
    build:
      context: ../TagPulse-UI
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - app

  db:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tagpulse
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: tagpulse
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tagpulse"]
      interval: 5s
      timeout: 3s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # Sprint 58 Phase C: continuous demo-tenant simulator. Opt-in via
  # ``docker compose --profile sim up -d sim`` (wrapped by ``make sim-start``).
  # Requires ``make demo-tenant`` to have run first so the tenant + devices
  # exist; expects ``$TAGPULSE_API_KEY`` to be set to the key printed by
  # ``seed_demo_tenant.py``. Sprint 59 §59.4: set ``$SIM_TENANTS`` to a
  # ``slug:key,slug:key`` list to drive several demo tenants at once (the
  # aggregate ``SIM_RATE_PER_MIN`` is split evenly across them).
  sim:
    profiles: ["sim"]
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    environment:
      TAGPULSE_API_URL: http://app:8000
      TAGPULSE_API_KEY: ${TAGPULSE_API_KEY:-}
      TAGPULSE_TENANT_ID: ${TAGPULSE_TENANT_ID:-}
      SIM_TENANTS: ${SIM_TENANTS:-}
      SIM_RATE_PER_MIN: ${SIM_RATE_PER_MIN:-200}
      SIM_DURATION: ${SIM_DURATION:-0}
      LOG_LEVEL: info
    depends_on:
      app:
        condition: service_started
    volumes:
      - ./scripts:/app/scripts:ro
    command: python scripts/sim_loop.py
    restart: unless-stopped

volumes:
  pgdata:
