# Mosquitto broker — production / cloud configuration baked into the
# tagpulse-mqtt image. Sprint 23 Phase A.
#
# Differs from the dev docker/mosquitto.conf (allow_anonymous true) in three
# ways:
#   1. Anonymous access is disabled; clients must present a username +
#      password. The password file is materialized at boot by
#      docker/mosquitto-entrypoint.sh from the MOSQUITTO_USERNAME and
#      MOSQUITTO_PASSWORD env vars.
#   2. Persistence is enabled but writes to /mosquitto/data inside the
#      container. The cloud ACI no longer mounts an Azure Files share
#      (Sprint 23 ADR-017), so retained messages and persistent
#      subscriptions do NOT survive a container restart. This is an
#      acceptable v1 trade — devices republish on reconnect, and the
#      Sprint 24 EMQX cutover replaces the broker with a managed HA
#      service that has its own persistence story.
#   3. TLS listener (8883) is intentionally NOT enabled here. Mutual TLS
#      for MQTT is the ADR-012 workstream and ships separately. Sprint
#      23 only changes the storage topology.

listener 1883
allow_anonymous false
password_file /mosquitto/config/mosquitto.passwd

persistence true
persistence_location /mosquitto/data/

# Log to stdout so Container Apps / ACI captures everything via
# `az container logs` and the App Insights pipeline.
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
