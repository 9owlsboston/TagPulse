name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: make lint
      - name: Type check
        run: make typecheck
      - name: Test
        run: make test
      # Sprint 28 H6: openapi.json must match what the live FastAPI app
      # emits. Regenerate and fail if the working tree drifts — forces
      # contributors to commit `make export-openapi` output alongside
      # route changes so clients (and the UI repo) consume an accurate
      # spec.
      - name: OpenAPI drift check
        run: |
          make export-openapi
          git diff --exit-code openapi.json

  # Sprint 28 A1+A4: Bicep `what-if` preview on PRs that touch
  # deploy/azure/bicep/. Posts the diff back to the PR so reviewers can
  # see the planned change set without running az locally. Skipped on
  # forks (no OIDC trust) and on main (no PR target).
  bicep-whatif:
    if: github.event_name == 'pull_request' && github.repository_owner == '9owlsboston'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    environment: dev
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Resilient path detection via local git instead of
      # dorny/paths-filter@v3, whose GitHub-API diff call intermittently
      # fails ("diff temporarily unavailable due to heavy server load")
      # and spuriously reds this required check. A local `git diff` needs
      # no API and can't hit that failure mode.
      - name: Detect Bicep changes
        id: changes
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BASE_REF"
          # `git diff --quiet` exits 0 = no change, 1 = changed, >1 = error.
          # As an `if` condition it's exempt from `set -e`; any non-zero
          # (changed OR error) routes to the `true` branch — fail-safe: on
          # the rare local-git error we run what-if rather than silently
          # skip a real Bicep change. No pipe, so no grep/SIGPIPE hazard.
          if git diff --quiet "origin/${BASE_REF}...HEAD" -- 'deploy/azure/bicep/**'; then
            echo "bicep=false" >> "$GITHUB_OUTPUT"
          else
            echo "bicep=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip when no Bicep changes
        if: steps.changes.outputs.bicep != 'true'
        run: echo "No deploy/azure/bicep/ changes — skipping what-if."
      - name: Azure login (OIDC)
        if: steps.changes.outputs.bicep == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Run what-if
        if: steps.changes.outputs.bicep == 'true'
        id: whatif
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -e
          # NB: 'main.bicep' is the entry point. The output is captured
          # raw and trimmed to keep the PR comment under GitHub's 65k
          # body limit.
          OUT=$(az deployment group what-if \
            --resource-group "$RG" \
            --template-file deploy/azure/bicep/main.bicep \
            --no-pretty-print 2>&1 | head -c 60000)
          {
            echo "report<<EOF"
            echo "$OUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Comment on PR
        if: steps.changes.outputs.bicep == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: bicep-whatif
          message: |
            ### Bicep `what-if` preview (env: dev)

            <details>
            <summary>Click to expand</summary>

            ```text
            ${{ steps.whatif.outputs.report }}
            ```

            </details>

            > Generated automatically by `.github/workflows/ci.yml` for
            > PRs touching `deploy/azure/bicep/**`. The diff is run
            > against the **dev** resource group — staging/production
            > behavior may differ if their parameter files diverge.

