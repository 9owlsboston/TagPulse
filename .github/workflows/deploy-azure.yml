# Sprint 22 C4 — Continuous deployment to Azure Container Apps.
# Sprint 36 — added auto-deploy to `dev` after every successful main build.
#
# Trigger:
#   - push of a `v*` tag                  → deploys to `production` GitHub Environment
#   - workflow_dispatch (env input)       → dev | staging | production
#   - workflow_run after build-and-push    → deploys to `dev` (only when the
#     completes on main                     upstream build succeeded on main).
#                                          This closes the gap that left
#                                          sprints 34/35 un-deployed for a week
#                                          (see PR #41 / Sprint 36 changelog).
#
# Reuses the images already published by build-and-push.yml — no rebuild.
#
# Sprint 28 wave 6 (A1–A5) coverage already in this workflow:
#   A1 preflight   → "Azure login (OIDC)" + "Discover resource names"
#                    fail fast if RG / Container Apps absent.
#   A2 ACA resolve → "Discover resource names" parallels the local
#                    `aca_name` helper in scripts/lib/azd-common.sh.
#   A3 image-SHA   → "Verify all three images exist in ACR" guards
#                    against partial build-and-push.yml runs.
#   A4 what-if     → posted as a PR comment by the bicep-whatif job
#                    in .github/workflows/ci.yml.
#   A5 smoke gate  → "Smoke test /health/ready" + "Network smoke".
#                    The richer scripts/azd-smoke.sh (Sprint 28 F2) is
#                    operator-side, since CI doesn't carry azd state.
#
# Per-environment GitHub Environments must exist (Settings → Environments):
#   - dev / staging / production, each with these *variables* set
#     (no secrets needed; OIDC federated identity replaces them):
#       AZURE_CLIENT_ID         App registration with a federated credential
#                               whose subject is
#                               repo:9owlsboston/TagPulse:environment:<env>
#       AZURE_TENANT_ID         Entra tenant
#       AZURE_SUBSCRIPTION_ID   Target subscription
#       AZURE_RESOURCE_GROUP    e.g. tagpulse-{dev|staging|prod}-rg
#       AZURE_ACR_NAME          ACR resource name (no .azurecr.io suffix)
#
# Rollback: re-run with the previous tag. Each revision is immutable.

name: deploy-azure

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target GitHub Environment'
        required: true
        type: choice
        default: production
        options: [dev, staging, production]
      image_tag:
        description: 'Image tag to deploy (full sha-<40hex>, short sha-<7hex>, v* tag, or empty to use this workflow''s commit SHA)'
        required: false
        type: string
  # Sprint 36 — auto-deploy to dev whenever build-and-push succeeds on main.
  # Using workflow_run (not push:branches:[main]) guarantees the ACR images
  # this workflow rolls out already exist before the verify step runs.
  workflow_run:
    workflows: ["build-and-push"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

# Auto-deploys land in `dev`; tag pushes go to `production`; manual dispatch
# picks. Concurrency is scoped per-env so a dev rollout cannot cancel a
# production rollout (or vice-versa).
concurrency:
  group: deploy-azure-${{ inputs.environment || (github.event_name == 'workflow_run' && 'dev') || 'production' }}
  cancel-in-progress: false

jobs:
  deploy:
    # Skip workflow_run invocations from failed builds. Tag pushes and manual
    # dispatches have no workflow_run payload, so the second clause lets them
    # through unconditionally.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # Tag pushes always go to production; manual dispatch picks the env;
    # workflow_run (auto-deploy after build) targets dev.
    # Each Environment scopes its own AZURE_* variables and (for production)
    # gates manual approval.
    environment: ${{ inputs.environment || (github.event_name == 'workflow_run' && 'dev') || 'production' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run defaults to checking out the default branch HEAD at
          # trigger time, not the commit that produced the image we're about
          # to deploy. Pin to the triggering SHA so the scripts/* helpers in
          # later steps match the deployed code.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image tag (requested)
        id: requested
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Sprint 32: this step records what the operator asked for; the
          # actual tag used by later steps comes from "Expand image tag",
          # which can resolve a short SHA prefix to the full tag in ACR.
          # Sprint 36: on workflow_run (auto-deploy), use the SHA of the
          # commit that produced the image — github.sha on a workflow_run
          # event points at the default-branch HEAD at trigger time, not
          # the head of the triggering build.
          if [ -n "${INPUT_TAG}" ]; then
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "tag=sha-${TRIGGER_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
          echo "Requested tag: $(cat "$GITHUB_OUTPUT" | tail -1)"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Expand image tag (short SHA → full SHA)
        id: tag
        env:
          ACR: ${{ vars.AZURE_ACR_NAME }}
          REQUESTED: ${{ steps.requested.outputs.tag }}
        run: |
          # Sprint 32: build-and-push.yml tags images with the FULL 40-char
          # commit SHA (`type=sha,format=long` in docker/metadata-action),
          # but operators almost always have a 7-char short SHA in hand
          # (`git rev-parse --short HEAD`, GitHub UI, commit URLs). Earlier
          # the deploy hard-required the long form, so passing
          # `image_tag=sha-aeed4a4` failed at the verify step even though
          # the image was sitting right there as
          # `sha-aeed4a499b618e933f0caa05e524f204d9b3ce5b`.
          #
          # Resolution rules (first match wins):
          #   1. Tag exists verbatim in tagpulse-api               → use it.
          #   2. Looks like `sha-<hex-prefix>` (any length 4–39)   → expand
          #      to the unique matching long-form tag in ACR.
          #   3. Otherwise                                          → fail
          #      with a list of recent tags so the operator can retry.
          #
          # We probe `tagpulse-api` only; the next step still verifies that
          # the resolved tag exists across all three repositories.
          set -e
          REQ="$REQUESTED"
          echo "Probing ACR for tag: $REQ"

          if az acr repository show-tags \
               --name "$ACR" --repository tagpulse-api \
               --query "[?@=='${REQ}'] | [0]" -o tsv 2>/dev/null \
               | grep -q "^${REQ}$"; then
            echo "Tag $REQ exists verbatim — using as-is"
            echo "tag=$REQ" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Try short-SHA expansion. Strip the sha- prefix, require hex.
          if [[ "$REQ" =~ ^sha-([0-9a-fA-F]{4,39})$ ]]; then
            PREFIX="${BASH_REMATCH[1]}"
            echo "Tag $REQ not found verbatim; treating $PREFIX as short SHA prefix"
            MATCHES=$(az acr repository show-tags \
              --name "$ACR" --repository tagpulse-api \
              --query "[?starts_with(@, 'sha-${PREFIX}')]" -o tsv | sort -u)
            COUNT=$(echo "$MATCHES" | grep -c . || true)
            if [ "$COUNT" -eq 1 ]; then
              RESOLVED=$(echo "$MATCHES" | head -1)
              echo "Resolved $REQ → $RESOLVED"
              echo "tag=$RESOLVED" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$COUNT" -eq 0 ]; then
              echo "::error::No image tag in tagpulse-api starts with sha-${PREFIX}"
            else
              echo "::error::Short SHA $PREFIX is ambiguous — ${COUNT} matches:"
              echo "$MATCHES" | sed 's/^/  - /'
            fi
          else
            echo "::error::Tag $REQ not found in tagpulse-api and is not a short-SHA prefix"
          fi

          echo "Recent tags in tagpulse-api:"
          az acr repository show-tags \
            --name "$ACR" --repository tagpulse-api \
            --orderby time_desc --top 10 -o tsv | sed 's/^/  - /'
          exit 1

      - name: Discover resource names
        id: names
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -e
          API=$(az containerapp list -g "$RG" --query "[?ends_with(name,'-api')].name | [0]" -o tsv)
          WORKER=$(az containerapp list -g "$RG" --query "[?ends_with(name,'-worker')].name | [0]" -o tsv)
          MIGRATIONS=$(az containerapp job list -g "$RG" --query "[?ends_with(name,'-migrations')].name | [0]" -o tsv)
          # The tools-job runs the tagpulse-api image (different command) for
          # operator scripts (seed_demo_tenant, smoke_setup, …). It is optional:
          # not every env declares one, so a missing tools-job is not fatal.
          TOOLS=$(az containerapp job list -g "$RG" --query "[?ends_with(name,'-tools')].name | [0]" -o tsv)
          for v in API WORKER MIGRATIONS; do
            val="${!v}"
            [[ -n "$val" ]] || { echo "Could not find ${v,,} resource in $RG"; exit 1; }
            echo "${v,,}=$val" >> "$GITHUB_OUTPUT"
            echo "  ${v,,} = $val"
          done
          echo "tools=$TOOLS" >> "$GITHUB_OUTPUT"
          echo "  tools = ${TOOLS:-<none>}"

      - name: Verify all three images exist in ACR
        env:
          ACR: ${{ vars.AZURE_ACR_NAME }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -e
          for component in api worker migrations; do
            echo "Checking ${ACR}.azurecr.io/tagpulse-${component}:${TAG}"
            az acr repository show-tags \
              --name "$ACR" \
              --repository "tagpulse-${component}" \
              --query "[?@=='${TAG}'] | [0]" -o tsv | grep -q "${TAG}" \
              || { echo "Missing tag ${TAG} for tagpulse-${component}"; exit 1; }
          done
          echo "All three images present at tag ${TAG}"

      - name: Run migrations job
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          ACR: ${{ vars.AZURE_ACR_NAME }}
          TAG: ${{ steps.tag.outputs.tag }}
          JOB: ${{ steps.names.outputs.migrations }}
        run: |
          set -e
          # Update job image to the target tag before running
          az containerapp job update \
            --name "$JOB" --resource-group "$RG" \
            --image "${ACR}.azurecr.io/tagpulse-migrations:${TAG}" >/dev/null
          EXEC=$(az containerapp job start --name "$JOB" --resource-group "$RG" --query 'name' -o tsv)
          echo "Migrations execution: $EXEC"
          for i in $(seq 1 60); do
            STATUS=$(az containerapp job execution show \
              --name "$JOB" --resource-group "$RG" --job-execution-name "$EXEC" \
              --query 'properties.status' -o tsv 2>/dev/null || echo Running)
            case "$STATUS" in
              Succeeded) echo "Migrations succeeded"; exit 0 ;;
              Failed|Degraded) echo "Migrations failed: $STATUS"; exit 1 ;;
              *) echo "  status=$STATUS (sleep 10)"; sleep 10 ;;
            esac
          done
          echo "Migrations job timed out after 10 minutes"
          exit 1

      - name: Roll out api
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          ACR: ${{ vars.AZURE_ACR_NAME }}
          TAG: ${{ steps.tag.outputs.tag }}
          APP: ${{ steps.names.outputs.api }}
        run: |
          set -e
          az containerapp update \
            --name "$APP" \
            --resource-group "$RG" \
            --image "${ACR}.azurecr.io/tagpulse-api:${TAG}"

      - name: Roll out worker
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          ACR: ${{ vars.AZURE_ACR_NAME }}
          TAG: ${{ steps.tag.outputs.tag }}
          APP: ${{ steps.names.outputs.worker }}
        run: |
          set -e
          az containerapp update \
            --name "$APP" \
            --resource-group "$RG" \
            --image "${ACR}.azurecr.io/tagpulse-worker:${TAG}"

      - name: Roll out tools-job image
        # The tools-job runs the tagpulse-api image for operator scripts
        # (seed_demo_tenant, smoke_setup, rotate-key, …). It is invoked
        # on-demand via scripts/azd-job.sh, which re-uses whatever image the
        # job currently carries — so if this deploy step is skipped, the job
        # silently runs stale code forever (it drifted to a months-old image
        # until this step was added). Pin it to the same api tag every deploy.
        # Optional: only run when an -tools job exists in the env.
        if: steps.names.outputs.tools != ''
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          ACR: ${{ vars.AZURE_ACR_NAME }}
          TAG: ${{ steps.tag.outputs.tag }}
          JOB: ${{ steps.names.outputs.tools }}
        run: |
          set -e
          az containerapp job update \
            --name "$JOB" \
            --resource-group "$RG" \
            --image "${ACR}.azurecr.io/tagpulse-api:${TAG}" >/dev/null
          echo "tools-job $JOB pinned to tagpulse-api:${TAG}"

      - name: Smoke test /health/ready
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          APP: ${{ steps.names.outputs.api }}
        run: |
          set -e
          FQDN=$(az containerapp show \
            --name "$APP" --resource-group "$RG" \
            --query 'properties.configuration.ingress.fqdn' -o tsv)
          echo "Hitting https://${FQDN}/health/ready"
          for i in $(seq 1 12); do
            if curl -fsS --max-time 10 "https://${FQDN}/health/ready" >/tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 10
          done
          echo "Smoke test failed after 2 minutes"
          exit 1

      # Sprint 23 Phase C2 -- network reachability smoke. The script no-ops
      # unless both AZURE_ENABLE_VNET and AZURE_DISABLE_PUBLIC_NETWORK_ACCESS
      # are 'true', so this step is safe to leave on for non-VNet envs.
      - name: Network smoke (VNet + private endpoints)
        if: ${{ vars.AZURE_ENABLE_VNET == 'true' }}
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_KEYVAULT_NAME: ${{ vars.AZURE_KEYVAULT_NAME }}
          AZURE_POSTGRES_FQDN: ${{ vars.AZURE_POSTGRES_FQDN }}
          AZURE_API_APP_NAME: ${{ steps.names.outputs.api }}
          AZURE_ENABLE_VNET: ${{ vars.AZURE_ENABLE_VNET }}
          AZURE_DISABLE_PUBLIC_NETWORK_ACCESS: ${{ vars.AZURE_DISABLE_PUBLIC_NETWORK_ACCESS }}
        run: ./scripts/azd-network-check.sh
