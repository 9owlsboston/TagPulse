# Sprint 22 B3 — multi-image build + push to GHCR.
#
# Builds three images in parallel (api, worker, migrations) from the
# matching Dockerfile targets (Sprint 22 B1) and pushes to
# ghcr.io/9owlsboston/tagpulse-{component}. Tags:
#   - {git-sha}      always (immutable, used by Helm/Bicep deploys)
#   - latest         only on push to main
#   - pr-{number}    on pull_request (no push, build-only)
#
# Provenance attestation via actions/attest-build-provenance keeps the
# supply chain story intact for Sprint 23+ SBOM work.

name: build-and-push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [api, worker, migrations]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/9owlsboston/tagpulse-${{ matrix.component }}
          tags: |
            type=sha,format=long
            type=ref,event=pr,prefix=pr-
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.component }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/9owlsboston/tagpulse-${{ matrix.component }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
