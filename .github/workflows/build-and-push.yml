# Sprint 22 B3 — multi-image build + push to GHCR (dev) and ACR (production).
#
# Builds three images in parallel (api, worker, migrations) from the
# matching Dockerfile targets (Sprint 22 B1) and pushes to:
#   - ghcr.io/9owlsboston/tagpulse-{component}    (always; dev convenience)
#   - ${ACR_NAME}.azurecr.io/tagpulse-{component} (only on push to main / v* tags;
#                                                  production source-of-truth, ACA pulls from here)
# Tags applied to both:
#   - {git-sha}      always (immutable, used by Bicep deploys)
#   - latest         only on push to main
#   - pr-{number}    on pull_request (no push, build-only)
#   - v*             on tag push (release tag)
#
# ACR auth is OIDC federation — no PATs in GitHub secrets. The federated
# credential on the AAD app must be bound to: repo:9owlsboston/TagPulse:ref:refs/heads/main
# and repo:9owlsboston/TagPulse:ref:refs/tags/v* (one credential per pattern).

name: build-and-push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [api, worker, migrations]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Azure (OIDC)
        if: github.event_name != 'pull_request' && vars.AZURE_ACR_NAME != ''
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        if: github.event_name != 'pull_request' && vars.AZURE_ACR_NAME != ''
        run: az acr login --name ${{ vars.AZURE_ACR_NAME }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/9owlsboston/tagpulse-${{ matrix.component }}
            ${{ vars.AZURE_ACR_NAME != '' && format('{0}.azurecr.io/tagpulse-{1}', vars.AZURE_ACR_NAME, matrix.component) || '' }}
          tags: |
            type=sha,format=long
            type=ref,event=pr,prefix=pr-
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      # Sprint 25 A1 — capture build_time once per job; reused as a Dockerfile
      # build-arg so /health/live can surface it at runtime.
      - name: Compute build_time
        id: build_meta
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.component }}
          push: ${{ github.event_name != 'pull_request' }}
          # Sprint 26 D2 — `load: true` keeps a local-daemon copy of the api
          # image so the next step can `docker run` it for the scripts/ import
          # smoke without pulling anything back from the registry. Coexists
          # with `push: true` on non-PR builds.
          load: true
          # PR #56 follow-up — disable buildx's default embedded SLSA
          # provenance attestation. With `load: true` + `push: true`,
          # buildx produces an OCI image **index** that wraps the image
          # manifest + an attestation manifest, but only the flat image
          # manifest is actually pushed to the registry (load mode forces
          # single-manifest output to the docker daemon). That left the
          # index digest reported by both `outputs.digest` and
          # `outputs.metadata['containerimage.digest']` un-fetchable at
          # GHCR (404), breaking `actions/attest-build-provenance@v1`
          # below. Setting `provenance: false` makes buildx emit a flat
          # single manifest whose digest matches what's pushed — and we
          # still get SLSA provenance via the attest-build-provenance
          # step, so no supply-chain signal is lost.
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Sprint 25 A1 — bake build identity into the image so /health/live
          # surfaces version + build_time to the SPA. BUILD_TIME is set in the
          # preceding step because GHA `env:` doesn't run shell expansions.
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            BUILD_TIME=${{ steps.build_meta.outputs.build_time }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      # Sprint 26 D2 — smoke that the api image (which the tools-job reuses)
      # still has scripts/*.py importable. Catches the failure mode where
      # someone moves a script under a subdirectory or renames a module
      # without updating the tools-job runbook. Only runs against the api
      # image (worker/migrations don't need scripts/).
      - name: Smoke — tools image imports scripts/
        if: matrix.component == 'api'
        run: |
          docker run --rm --entrypoint python ${{ steps.push.outputs.imageid }} \
            -c "import scripts.smoke_setup, scripts.simulate_devices, scripts.simulate_assets, scripts.simulate_inventory, scripts.benchmark_pg_metrics; print('tools-image scripts import OK')"

      # GitHub's attestation API is not available on user-owned private repos
      # (https://docs.github.com/rest/repos/attestations#create-an-attestation),
      # so we skip provenance unless the repository is public. Re-enabled
      # automatically if/when the repo is flipped to public.
      #
      # NOTE on `subject-digest`: we source it from buildx's metadata file
      # (`containerimage.digest`) rather than `steps.push.outputs.digest`.
      # With `load: true` + `push: true`, `outputs.digest` is the local
      # image id (not the remote manifest digest). And without the
      # `provenance: false` setting on the build step above, the
      # metadata `containerimage.digest` would point at an OCI index
      # that buildx generates but doesn't push under `load: true`,
      # which is also a 404 at GHCR. With both in place, the metadata
      # digest equals the actual pushed manifest digest.
      # See docker/build-push-action#1015.
      - name: Attest build provenance (GHCR)
        if: github.event_name != 'pull_request' && !github.event.repository.private
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/9owlsboston/tagpulse-${{ matrix.component }}
          subject-digest: ${{ fromJSON(steps.push.outputs.metadata)['containerimage.digest'] }}
          push-to-registry: true
